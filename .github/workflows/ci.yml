name: CI - Tests & Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ===== Job 1: Unit Tests =====
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: etsy_user
          POSTGRES_PASSWORD: etsy_password
          POSTGRES_DB: etsy_automation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run unit tests
        env:
          TEST_DATABASE_URL: postgresql://etsy_user:etsy_password@localhost:5432/etsy_automation_test
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
        run: |
          cd apps/api
          pytest tests/test_unit_policy.py tests/test_unit_rate_limiter.py -v --cov=app --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/api/coverage.xml
          flags: unit
  
  # ===== Job 2: Contract Tests =====
  contract-tests:
    name: Contract Tests (API)
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: etsy_user
          POSTGRES_PASSWORD: etsy_password
          POSTGRES_DB: etsy_automation_test
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run contract tests
        env:
          TEST_DATABASE_URL: postgresql://etsy_user:etsy_password@localhost:5432/etsy_automation_test
        run: |
          cd apps/api
          pytest tests/test_contract_apis.py -v
  
  # ===== Job 3: Security Tests =====
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install pytest bandit safety
      
      - name: Run security tests
        env:
          TEST_DATABASE_URL: postgresql://etsy_user:etsy_password@localhost:5432/etsy_automation_test
        run: |
          cd apps/api
          pytest tests/test_security.py tests/test_security_advanced.py -v
      
      - name: Run Bandit security scanner
        run: |
          cd apps/api
          bandit -r app/ -f json -o bandit-report.json || true
      
      - name: Check dependencies for vulnerabilities
        run: |
          cd apps/api
          safety check --json || true
  
  # ===== Job 4: E2E Tests =====
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [contract-tests, security-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: etsy_user
          POSTGRES_PASSWORD: etsy_password
          POSTGRES_DB: etsy_automation_test
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run E2E tests
        env:
          TEST_DATABASE_URL: postgresql://etsy_user:etsy_password@localhost:5432/etsy_automation_test
        run: |
          cd apps/api
          pytest tests/test_e2e_user_journey.py -v -s
  
  # ===== Job 5: Linting & Code Quality =====
  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linters
        run: |
          pip install flake8 black isort mypy
      
      - name: Run Black
        run: |
          cd apps/api
          black --check app/ tests/
      
      - name: Run isort
        run: |
          cd apps/api
          isort --check-only app/ tests/
      
      - name: Run Flake8
        run: |
          cd apps/api
          flake8 app/ tests/ --max-line-length=120 --extend-ignore=E203,W503
  
  # ===== Job 6: Frontend Tests =====
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      
      - name: Run frontend tests
        run: |
          cd apps/web
          npm test || true
      
      - name: Build frontend
        run: |
          cd apps/web
          npm run build
  
  # ===== Job 7: Quality Gate =====
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests, security-tests, e2e-tests, lint]
    
    steps:
      - name: Check all tests passed
        run: echo "✅ All quality gates passed!"

# ===== Optional: Load Tests (manual trigger) =====
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Locust
        run: pip install locust
      
      - name: Run load tests
        run: |
          cd load_tests
          locust -f locustfile.py --host=http://localhost:8080 --users=100 --spawn-rate=10 --run-time=5m --headless

